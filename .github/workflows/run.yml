name: Build

on:
  push:
    branches:
      - stage4
  pull_request:
    branches:
      - stage4
  schedule:
    - cron: '0 0 * * 6'

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest,macos-latest,windows-latest]

    steps:
    - name: Install QEMU (ubuntu)
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: |
        sudo apt-get update
        sudo apt-get install qemu-system-x86 qemu-system-arm
    - name: Install QEMU (macos)
      if: ${{ matrix.os == 'macos-latest' }}
      run: |
        brew update
        brew install qemu
    - name: Install QEMU (windows)
      if: ${{ matrix.os == 'windows-latest' }}
      run: |
        choco install qemu
        echo "$Env:Programfiles\qemu" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: pwsh
    - uses: actions/checkout@v6
      with:
         submodules: true
    - name: Check Cargo availability
      run: cargo --version
    - name: Install bootimage
      run: cargo install bootimage
    - name: Build (x86_64)
      run:
         cargo build
    - name: Build (aarch64)
      run:
        cargo build --target=aarch64-eduos.json
    - name: run (ubuntu)
      if: ${{ matrix.os == 'ubuntu-latest' }}
      run: ./test.sh
    - name: run aarch64 (ubuntu)
      if: ${{ matrix.os == 'ubuntu-latest' }}
      # The demo prints many lines over (slow) semihosting while the tasks
      # convoy on the console lock, so the emulated run can take several
      # minutes. Allow plenty of time before it is considered a hang.
      timeout-minutes: 20
      run: |
        cargo run --target=aarch64-eduos.json | tee output.log
        grep -q "Shutdown system!" output.log
    - name: run (macos)
      if: ${{ matrix.os == 'macos-latest' }}
      run: ./test.sh
    - name: run (windows)
      if: ${{ matrix.os == 'windows-latest' }}
      run: pwsh -command ".\$GITHUB_WORKSPACE\test.ps1"